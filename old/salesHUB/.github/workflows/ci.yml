name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: saleshub
          POSTGRES_PASSWORD: saleshub
          POSTGRES_DB: saleshub
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: salesHUB

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: salesHUB/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Migrate
        env:
          DATABASE_URL: postgresql://saleshub:saleshub@localhost:5433/saleshub?schema=public
        run: npx prisma migrate deploy

      - name: Test
        env:
          DATABASE_URL: postgresql://saleshub:saleshub@localhost:5433/saleshub?schema=public
        run: npm test

      - name: Build
        env:
          DATABASE_URL: postgresql://saleshub:saleshub@localhost:5433/saleshub?schema=public
          NEXTAUTH_SECRET: ci-secret-at-least-32-chars-long-ok
          GOOGLE_CLIENT_ID: x
          GOOGLE_CLIENT_SECRET: x
        run: npm run build
