services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: saleshub
      POSTGRES_PASSWORD: saleshub
      POSTGRES_DB: saleshub
    volumes:
      - saleshub_pg_data:/var/lib/postgresql/data
    networks:
      - salesHUB_pg

volumes:
  saleshub_pg_data:

# call_rec コンテナから参照できるよう外部公開ネットワークとして定義
networks:
  salesHUB_pg:
    name: salesHUB_pg
